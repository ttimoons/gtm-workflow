<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GTM Workflow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: #cbd5e1;
        }
        input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.9375rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus {
            border-color: #6366f1;
        }
        button {
            width: 100%;
            padding: 0.625rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #4f46e5; }
        .error {
            color: #f87171;
            font-size: 0.8125rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>GTM Workflow</h1>
        <p class="subtitle">Sign in to continue</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <p class="error" id="error">Invalid username or password</p>
            <button type="submit">Sign in</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const data = new TextEncoder().encode(user + ':' + pass + ':gtm-antilop-salt');
            const hash = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', data)))
                .map(b => b.toString(16).padStart(2, '0')).join('');
            if (hash === 'b8502bc63671178e21aefdfd14bbc591b19e4764f34f18a680bcf1f29432a6a4') {
                document.cookie = 'gtm_auth=' + hash + '; path=/; max-age=2592000; SameSite=Strict; Secure';
                window.location.href = '/';
            } else {
                document.getElementById('error').classList.add('visible');
            }
        });
    </script>
</body>
</html>
